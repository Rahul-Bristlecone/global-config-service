apiVersion: v1
kind: Deployment
metadata:
  name: godaampe-config-deployment
  labels:
    app: godaampe-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: godaampe-config
  template:
    metadata:
      labels:
        app: godaampe-config
    spec:
      containers:
        - name: godaampe-config
          image: daemon/godaampe-config
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: db-secret
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /readiness
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
            path: /liveness
            port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: godaampe-config-service
spec:
  # type: NodePort
  selector:
    app: godaampe-config
  ports:
    - port: 5000
      targetPort: 5000
      # nodePort: 30002
